name: "Gemini AI Code Review"

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Gemini AI Code Review
        uses: sshnaidm/gemini-code-review-action@v2
        with:
          gemini-key: ${{ secrets.GEMINI_API_KEY }}
          model: "gemini-3.5-flash" # не факт что хватит лимитов, потестим, зависит от того сколько тратит 1 PR
          # model: "gemini-3.1-flash-lite" # дофига лимитов но туповата